<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Security Approval Required</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ec5b13",
                "background-light": "#f8f6f6",
                "background-dark": "#0a0a0f",
              },
              fontFamily: {
                "display": ["Public Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .mac-window-shadow {
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5), 0 30px 60px -30px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">
<!-- Full Screen Dim Overlay Simulation -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-0"></div>
<!-- Narrow macOS Window (380x680) -->
<div class="relative z-10 w-[380px] h-[680px] bg-background-dark rounded-xl flex flex-col overflow-hidden mac-window-shadow border border-white/10">
<!-- macOS Style Header -->
<header class="flex items-center px-4 py-3 border-b border-white/5 bg-white/5 backdrop-blur-md">
<div class="flex gap-2">
<div class="w-3 h-3 rounded-full bg-[#ff5f57]"></div>
<div class="w-3 h-3 rounded-full bg-[#febc2e]"></div>
<div class="w-3 h-3 rounded-full bg-[#28c840]"></div>
</div>
<div class="flex-1 text-center">
<span class="text-[11px] font-medium text-slate-400 tracking-wide uppercase">Security</span>
</div>
<div class="w-12"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Section -->
<div class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<!-- Large Red Shield Icon -->
<div class="mb-8">
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 bg-red-600/20 blur-3xl rounded-full"></div>
<span class="material-symbols-outlined text-[120px] text-red-600 leading-none relative z-10" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        shield_with_heart
                    </span>
</div>
</div>
<!-- Approval Text -->
<h1 class="text-white text-xl font-bold leading-tight mb-8">
                This action requires your approval.
            </h1>
<!-- Subtle Dark Action Card -->
<div class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-10">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-slate-500 text-xl">description</span>
<p class="text-slate-200 text-sm font-medium tracking-tight">
                        delete tax-return-2024.pdf
                    </p>
</div>
</div>
<!-- Red Progress Bar (Counting down) -->
<div class="w-full max-w-[240px] mb-4">
<div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
<!-- Progress at ~85% -->
<div class="h-full bg-red-600 rounded-full" style="width: 85%;"></div>
</div>
</div>
<p class="text-red-600/80 text-[10px] font-bold uppercase tracking-[0.2em] mb-12">
                Authorization Pending
            </p>
</div>
<!-- Footer Instruction -->
<footer class="pb-10 pt-4 px-8 text-center">
<div class="flex flex-col items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-slate-400">smartphone</span>
<p class="text-slate-400 text-xs font-medium">Check your iPhone.</p>
</div>
</footer>
<!-- Bottom Safe Area Decoration -->
<div class="h-1 w-32 bg-white/10 rounded-full mx-auto mb-2"></div>
</div>
</body></html>
