<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0a0a0f",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Public Sans', sans-serif;
        }
        .app-window {
            width: 380px;
            height: 680px;
            background-color: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .glow-effect {
            box-shadow: 0 0 40px 10px rgba(124, 58, 237, 0.3);
        }
        .mic-button-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
        }
    </style>
</head>
<body class="bg-background-dark">
<div class="app-window rounded-3xl flex flex-col items-center justify-between py-12 px-6">
<!-- Top Wordmark -->
<div class="flex flex-col items-center">
<div class="flex items-center gap-2 text-white/90">
<span class="text-xl font-light tracking-wide">◈ Aegis</span>
</div>
</div>
<!-- Central Interaction Area -->
<div class="flex flex-col items-center justify-center flex-1 w-full">
<div class="relative group">
<!-- Glowing Aura -->
<div class="absolute inset-0 rounded-full bg-[#7c3aed]/20 blur-3xl scale-150"></div>
<!-- Mic Button -->
<button class="relative mic-button-gradient glow-effect size-32 rounded-full flex items-center justify-center transition-transform hover:scale-105 active:scale-95 border border-white/10">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        mic
                    </span>
</button>
</div>
<!-- Status Caption -->
<div class="mt-12">
<p class="text-slate-400 text-sm font-light tracking-tight opacity-80">
                    I'm ready when you are.
                </p>
</div>
</div>
<!-- Decorative Footer Indicator (Simulating macOS pill) -->
<div class="w-24 h-1 bg-white/10 rounded-full mt-4"></div>
</div>
<!-- Background Subtle Gradients -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#7c3aed]/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
