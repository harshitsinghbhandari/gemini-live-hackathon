<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0D1117",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0D1117;
        }
        .iphone-frame {
            width: 390px;
            height: 844px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            border: 8px solid #1f2937;
            border-radius: 3rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display antialiased flex items-center justify-center min-h-screen">
<div class="iphone-frame bg-background-dark shadow-2xl flex flex-col">
<!-- Status Bar -->
<div class="h-12 w-full flex items-center justify-between px-8 pt-4">
<span class="text-slate-100 text-sm font-semibold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px] text-slate-100">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px] text-slate-100">wifi</span>
<span class="material-symbols-outlined text-[18px] text-slate-100">battery_full</span>
</div>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col items-center justify-center px-8">
<!-- Aegis Shield Icon -->
<div class="mb-8 p-6 bg-primary/10 rounded-3xl">
<div class="text-primary flex items-center justify-center" data-icon="shield">
<span class="material-symbols-outlined !text-6xl" style="font-variation-settings: 'FILL' 1, 'wght' 300;">shield_with_heart</span>
</div>
</div>
<!-- Title -->
<h1 class="text-slate-100 text-2xl font-medium tracking-tight mb-12">Aegis Mobile</h1>
<!-- Connection Status -->
<div class="flex flex-col items-center gap-4 w-full">
<div class="flex items-center gap-3 px-5 py-2.5 bg-slate-800/40 rounded-full border border-slate-700/50">
<span class="relative flex h-2.5 w-2.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
</span>
<span class="text-slate-100 text-sm font-medium">Session Active</span>
</div>
<p class="font-mono text-slate-500 text-xs tracking-widest uppercase">AE-9921-X••••</p>
</div>
</div>
<!-- Bottom Actions -->
<div class="p-8 pb-12 flex flex-col items-center gap-6">
<button class="w-full py-4 rounded-xl border border-red-500/40 text-red-500 font-medium text-base hover:bg-red-500/5 transition-colors">
                Stop Session
            </button>
<!-- Home Indicator -->
<div class="w-32 h-1.5 bg-slate-700 rounded-full mt-2"></div>
</div>
<!-- Background Subtle Gradient Decor -->
<div class="absolute top-[-10%] left-[-10%] w-[120%] h-[40%] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
</div>
</body></html>
