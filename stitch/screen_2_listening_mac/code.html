<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aegis - Listening</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0a0a0f",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-window {
            width: 380px;
            height: 680px;
            background-color: #0a0a0f;
            border: 1px solid #1e1e26;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .waveform-bar {
            width: 4px;
            background-color: #a855f7;
            border-radius: 2px;
            transition: height 0.2s ease;
        }
    </style>
</head>
<body class="font-display">
<div class="app-window rounded-xl">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-6 py-4 border-b border-white/5">
<div class="flex items-center gap-2 text-slate-100">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-sm">radio_button_checked</span>
</div>
<h2 class="text-slate-100 text-sm font-semibold tracking-tight">Aegis</h2>
</div>
<div class="bg-white/5 px-3 py-1 rounded-full">
<span class="text-slate-400 text-xs font-medium tracking-wider">0:12</span>
</div>
</header>
<!-- Main Listening Content -->
<main class="flex-1 flex flex-col items-center justify-center px-8">
<!-- Audio Waveform Visualization -->
<div class="flex items-end justify-center gap-[3px] h-32 mb-8">
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-28"></div>
<div class="waveform-bar h-32"></div>
<div class="waveform-bar h-26"></div>
<div class="waveform-bar h-22"></div>
<div class="waveform-bar h-14"></div>
<div class="waveform-bar h-18"></div>
<div class="waveform-bar h-26"></div>
<div class="waveform-bar h-30"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-10"></div>
<div class="waveform-bar h-14"></div>
<div class="waveform-bar h-8"></div>
</div>
<!-- Status Caption -->
<p class="text-slate-500 text-sm font-normal tracking-wide italic">I'm hearing you.</p>
</main>
<!-- Footer / Action Area -->
<footer class="p-8 flex justify-center">
<button class="flex items-center justify-center gap-2 bg-red-950/40 hover:bg-red-900/60 border border-red-900/30 text-red-500 px-8 py-3 rounded-full transition-all duration-200">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">stop</span>
<span class="text-sm font-bold tracking-wide">Stop</span>
</button>
</footer>
</div>
</body></html>
