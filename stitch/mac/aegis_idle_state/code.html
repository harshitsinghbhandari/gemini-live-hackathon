<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0D1117",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- macOS style Traffic Lights (Visual only) -->
<div class="absolute top-4 left-4 flex gap-2">
<div class="w-3 h-3 rounded-full bg-slate-700/50"></div>
<div class="w-3 h-3 rounded-full bg-slate-700/50"></div>
<div class="w-3 h-3 rounded-full bg-slate-700/50"></div>
</div>
<div class="layout-container flex h-full grow flex-col items-center justify-center px-6">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-12 flex flex-col items-center">
<div class="w-20 h-20 mb-6 flex items-center justify-center rounded-2xl bg-slate-800/40 border border-slate-700/50">
<span class="material-symbols-outlined text-slate-400 !text-5xl">shield</span>
</div>
<h1 class="text-3xl font-semibold tracking-tight text-slate-100">Aegis</h1>
<p class="text-slate-500 mt-2 text-sm">Secure local environment</p>
</div>
<!-- Status List -->
<div class="w-full space-y-2 mb-10">
<!-- Status Row 1 -->
<div class="flex items-center justify-between p-4 rounded-xl bg-slate-800/20 border border-slate-800/50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800/40 text-slate-400">
<span class="material-symbols-outlined !text-xl">database</span>
</div>
<span class="text-slate-300 text-sm font-medium">Helper Server</span>
</div>
<div class="flex items-center gap-2">
<span class="text-slate-500 text-xs">Offline</span>
<div class="w-2 h-2 rounded-full bg-slate-600"></div>
</div>
</div>
<!-- Status Row 2 -->
<div class="flex items-center justify-between p-4 rounded-xl bg-slate-800/20 border border-slate-800/50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-800/40 text-slate-400">
<span class="material-symbols-outlined !text-xl">person</span>
</div>
<span class="text-slate-300 text-sm font-medium">Agent</span>
</div>
<div class="flex items-center gap-2">
<span class="text-slate-500 text-xs">Disconnected</span>
<div class="w-2 h-2 rounded-full bg-slate-600"></div>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-3">
<button class="w-full h-12 flex items-center justify-center rounded-lg border border-slate-700 hover:bg-slate-800/50 transition-colors text-slate-200 font-medium text-sm">
                    Start Session
                </button>
<div class="flex items-center justify-center gap-4 mt-4">
<button class="flex items-center gap-1 text-slate-500 hover:text-slate-300 text-xs transition-colors">
<span class="material-symbols-outlined !text-sm">settings</span>
                        Preferences
                    </button>
<button class="flex items-center gap-1 text-slate-500 hover:text-slate-300 text-xs transition-colors">
<span class="material-symbols-outlined !text-sm">help</span>
                        Documentation
                    </button>
</div>
</div>
</div>
</div>
<!-- Footer Decoration -->
<div class="absolute bottom-8 w-full flex justify-center opacity-20 pointer-events-none">
<div class="w-96 h-px bg-gradient-to-r from-transparent via-slate-500 to-transparent"></div>
</div>
</body></html>
