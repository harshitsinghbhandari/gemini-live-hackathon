<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aegis - Listening</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0D1117",
                        "surface-dark": "#161B22",
                    },
                    fontFamily: {
                        "display": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .waveform-circle {
            border: 2px solid rgba(19, 109, 236, 0.3);
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col items-center">
<header class="flex w-full items-center justify-between px-8 py-6 max-w-[1440px]">
<div class="flex items-center gap-3">
<div class="text-primary">
<svg class="w-6 h-6" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-100 text-xl font-bold tracking-tight">Aegis</h2>
</div>
<div class="flex gap-3">
<div class="w-2.5 h-2.5 rounded-full bg-emerald-500/80"></div>
<div class="w-2.5 h-2.5 rounded-full bg-emerald-500/80"></div>
</div>
</header>
<main class="flex flex-1 flex-col items-center justify-center w-full max-w-[960px] px-6">
<div class="relative flex items-center justify-center w-80 h-80 mb-16">
<div class="absolute inset-0 rounded-full border border-slate-800/50 scale-125"></div>
<div class="absolute inset-0 rounded-full border border-slate-800 scale-100"></div>
<div class="absolute inset-0 rounded-full border border-primary/20 scale-75"></div>
<div class="flex items-center gap-1.5 h-32">
<div class="w-1 bg-primary h-12 rounded-full opacity-40"></div>
<div class="w-1 bg-primary h-20 rounded-full opacity-60"></div>
<div class="w-1 bg-primary h-28 rounded-full"></div>
<div class="w-1 bg-primary h-32 rounded-full"></div>
<div class="w-1 bg-primary h-24 rounded-full opacity-80"></div>
<div class="w-1 bg-primary h-16 rounded-full opacity-50"></div>
<div class="w-1 bg-primary h-8 rounded-full opacity-30"></div>
</div>
</div>
<div class="w-full max-w-md bg-surface-dark border border-slate-800/50 rounded-xl p-6 mb-12">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-primary text-sm">graphic_eq</span>
<p class="text-slate-400 text-[11px] font-bold tracking-widest uppercase">Live Transcript</p>
</div>
<div class="space-y-2 font-mono text-sm leading-relaxed">
<p class="text-slate-500"><span class="text-primary/60">[00:12:45]</span> <span class="text-slate-300">Awaiting audio input...</span></p>
<p class="text-slate-300"><span class="text-primary/60">[00:12:48]</span> Listening for primary command set. Frequency calibration complete.</p>
<div class="flex items-center gap-1">
<span class="text-primary/60">[00:12:51]</span>
<span class="text-slate-100">Analyzing environment...</span>
<span class="w-1.5 h-4 bg-primary animate-pulse ml-0.5"></span>
</div>
</div>
</div>
<div class="flex flex-col items-center gap-4">
<button class="flex items-center justify-center px-8 py-3 rounded-full bg-slate-800/30 hover:bg-slate-800/50 text-slate-400 hover:text-slate-200 transition-all duration-200 group">
<span class="material-symbols-outlined text-sm mr-2 group-hover:text-red-400 transition-colors">stop_circle</span>
<span class="text-sm font-semibold tracking-wide uppercase">Stop Listening</span>
</button>
<p class="text-slate-600 text-[10px] font-medium tracking-[0.2em] uppercase">Press ESC to cancel</p>
</div>
</main>
<footer class="w-full py-8 flex justify-center opacity-30">
<div class="flex gap-8">
<div class="w-32 h-1 bg-gradient-to-r from-transparent via-slate-700 to-transparent"></div>
</div>
</footer>
</div>
</div>
<div class="fixed inset-0 pointer-events-none border-[1px] border-white/5 rounded-none z-50"></div>
