name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'services/backend/**'
      - 'packages/aegis/**'
  create:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: 'aegis-github-actions@guardian-agent-160706.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx          # ← needed for --platform flag
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & Push Docker Image
        run: |
          IMAGE="us-central1-docker.pkg.dev/guardian-agent-160706/guardian/guardian-backend"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            -t $IMAGE \
            --push \
            ./services/backend        # ← build context is services/backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy guardian-backend \
            --image us-central1-docker.pkg.dev/guardian-agent-160706/guardian/guardian-backend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars PROJECT_ID=guardian-agent-160706 \
            --quiet

      - name: Show URL
        run: |
          gcloud run services describe guardian-backend \
            --region us-central1 \
            --format 'value(status.url)'